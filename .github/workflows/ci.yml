name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  backend:
    name: Backend (import + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Verify imports
        run: python -c "import main; import logic.classifier; import logic.generator; import logic.expander; import logic.report_generator"
      - name: Run pytest (if tests exist)
        run: |
          if [ -d tests ] && find tests -name 'test_*.py' -o -name '*_test.py' | grep -q .; then
            pytest -q
          else
            echo "No pytest tests yet — skipping."
          fi
